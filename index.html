<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Channel Deck — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<style>
  :root{
    --bg: #0B0E14;
    --surface: #131822;
    --surface-raised: #1B2230;
    --border: #262E3D;
    --text: #E8EAED;
    --text-muted: #8A93A6;
    --amber: #FFB020;
    --cyan: #4DD8E8;
    --red: #FF4D4D;
    --display: 'Oswald', sans-serif;
    --body: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }
  html,body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
  }

  body{
    background-image:
      radial-gradient(circle at 15% 0%, rgba(77,216,232,0.06), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(255,176,32,0.05), transparent 45%);
  }

  a{ color: inherit; }

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 22px clamp(20px, 5vw, 56px);
    border-bottom: 1px solid var(--border);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family: var(--display);
    font-weight:600;
    font-size: 20px;
    letter-spacing: 0.5px;
  }
  .brand .dot{
    width:9px; height:9px; border-radius:50%;
    background: var(--red);
    box-shadow: 0 0 8px 1px rgba(255,77,77,0.7);
    animation: pulse 1.8s ease-in-out infinite;
  }
  .clock{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:.35; }
  }

  /* ---------- monitor / hero ---------- */
  .stage{
    padding: clamp(24px, 4vw, 48px) clamp(20px, 5vw, 56px) 0;
    max-width: 1180px;
    margin: 0 auto;
  }

  .monitor{
    position: relative;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    aspect-ratio: 16/9;
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.02) inset;
  }

  .monitor video{
    width:100%; height:100%; object-fit: contain; background:#000;
    display:block;
  }

  .scanline-overlay{
    position:absolute; inset:0;
    pointer-events:none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: overlay;
    opacity: .5;
  }

  .placeholder{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px;
    color: var(--text-muted);
    text-align:center;
    padding: 24px;
  }
  .placeholder .glyph{
    width:54px; height:54px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
  }
  .placeholder .glyph svg{ width:22px; height:22px; opacity:.6; }
  .placeholder p{ font-size: 13px; max-width: 280px; line-height:1.5; }

  .lower-third{
    position:absolute;
    left: 18px; bottom: 18px;
    display:flex;
    align-items:center;
    gap: 12px;
    padding: 10px 16px 10px 10px;
    background: rgba(11,14,20,0.72);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .35s ease, transform .35s ease;
  }
  .lower-third.show{ opacity:1; transform: translateY(0); }

  .lower-third .num{
    font-family: var(--display);
    font-size: 20px;
    font-weight: 600;
    color: var(--cyan);
    border-right: 1px solid rgba(255,255,255,0.12);
    padding-right: 12px;
  }
  .lower-third .meta{ display:flex; flex-direction:column; gap:2px; }
  .lower-third .name{ font-family: var(--display); font-size: 14px; letter-spacing:.4px; }
  .lower-third .tag{
    display:flex; align-items:center; gap:6px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
    color: var(--red); text-transform:uppercase;
  }
  .lower-third .tag::before{
    content:''; width:6px; height:6px; border-radius:50%;
    background: var(--red);
    box-shadow: 0 0 6px 1px rgba(255,77,77,0.8);
    animation: pulse 1.8s ease-in-out infinite;
  }

  .mute-btn{
    position:absolute;
    right: 18px; bottom: 18px;
    width: 42px; height:42px;
    border-radius: 50%;
    background: rgba(11,14,20,0.72);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition: border-color .2s, color .2s, transform .15s;
  }
  .mute-btn:hover{ border-color: var(--cyan); color: var(--cyan); }
  .mute-btn:active{ transform: scale(0.94); }
  .mute-btn svg{ width:18px; height:18px; }
  .mute-btn.is-muted{ color: var(--amber); }
  .mute-btn .x-line{ display:none; }
  .mute-btn.is-muted .x-line{ display:inline; }
  .mute-btn:not(.is-muted) .vol-wave{ display:inline; }
  .mute-btn.is-muted .vol-wave{ display:none; }

  .volume-wrap{
    position:absolute;
    right: 18px; bottom: 18px;
    display:flex;
    align-items:center;
    gap: 0;
  }
  .volume-wrap .mute-btn{
    position: static;
    flex-shrink:0;
  }
  .volume-slider-pill{
    max-width: 0;
    overflow: hidden;
    display:flex;
    align-items:center;
    background: rgba(11,14,20,0.72);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 21px;
    height: 42px;
    margin-right: -21px;
    padding-right: 21px;
    transition: max-width .25s ease, padding-left .25s ease;
  }
  .volume-wrap:hover .volume-slider-pill,
  .volume-wrap:focus-within .volume-slider-pill{
    max-width: 110px;
    padding-left: 14px;
  }
  .volume-slider-pill input[type="range"]{
    -webkit-appearance: none;
    appearance: none;
    width: 90px;
    height: 3px;
    border-radius: 3px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  .volume-slider-pill input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--cyan);
    cursor: pointer;
    box-shadow: 0 0 0 3px rgba(77,216,232,0.15);
  }
  .volume-slider-pill input[type="range"]::-moz-range-thumb{
    width: 13px; height: 13px;
    border: none;
    border-radius: 50%;
    background: var(--cyan);
    cursor: pointer;
    box-shadow: 0 0 0 3px rgba(77,216,232,0.15);
  }

  .fullscreen-btn{
    position:absolute;
    right: 18px; bottom: 68px;
    width: 42px; height:42px;
    border-radius: 50%;
    background: rgba(11,14,20,0.72);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition: border-color .2s, color .2s, transform .15s;
  }
  .fullscreen-btn:hover{ border-color: var(--cyan); color: var(--cyan); }
  .fullscreen-btn:active{ transform: scale(0.94); }
  .fullscreen-btn svg{ width:18px; height:18px; }

  body.is-fullscreen{
    overflow: hidden;
    background: #000;
  }
  body.is-fullscreen .topbar,
  body.is-fullscreen .stage-controls,
  body.is-fullscreen .deck{
    display: none;
  }
  body.is-fullscreen .stage{ padding: 0; max-width: none; }
  body.is-fullscreen .monitor{
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    aspect-ratio: unset;
    border-radius: 0;
    z-index: 999;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  body.is-fullscreen .monitor video{
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* Force landscape display when fullscreen is opened on a portrait phone
     (fallback for browsers where screen.orientation.lock isn't available/permitted, e.g. iOS) */
  @media (orientation: portrait){
    body.is-fullscreen .monitor{
      width: 100vh;
      height: 100vw;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
    }
  }

  .channels-btn{
    position:absolute;
    left: 18px; bottom: 18px;
    width: 42px; height:42px;
    border-radius: 50%;
    background: rgba(11,14,20,0.72);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text);
    display:none;
    align-items:center; justify-content:center;
    cursor:pointer;
    transition: border-color .2s, color .2s, transform .15s;
  }
  body.is-fullscreen .channels-btn{ display:flex; }
  .channels-btn:hover{ border-color: var(--cyan); color: var(--cyan); }
  .channels-btn.active{ border-color: var(--cyan); color: var(--cyan); }
  .channels-btn svg{ width:18px; height:18px; }

  .center-toggle{
    position:absolute;
    top:50%; left:50%;
    transform: translate(-50%, -50%);
    width: 64px; height:64px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.3);
    color: #fff;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
    z-index: 4;
  }
  .center-toggle.show{ opacity:1; pointer-events:auto; }
  .center-toggle svg{ width:22px; height:22px; }
  .center-toggle .icon-pause{ display:none; }
  .center-toggle.is-playing .icon-play{ display:none; }
  .center-toggle.is-playing .icon-pause{ display:block; }



  .stop-btn{
    position:absolute;
    right: 18px; top: 18px;
    width: 40px; height:40px;
    border-radius: 50%;
    background: rgba(11,14,20,0.72);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text);
    display:flex;
    align-items:center; justify-content:center;
    cursor:pointer;
    z-index: 6;
    transition: border-color .2s, color .2s, transform .15s;
  }
  .stop-btn:hover{ border-color: var(--red); color: var(--red); }
  .stop-btn:active{ transform: scale(0.94); }
  .stop-btn svg{ width:14px; height:14px; }

  .fs-drawer{
    position:absolute;
    left: 0; top: 0; bottom: 0;
    width: min(280px, 78vw);
    background: rgba(11,14,20,0.92);
    backdrop-filter: blur(10px);
    border-right: 1px solid var(--border);
    transform: translateX(-100%);
    transition: transform .28s ease;
    overflow-y: auto;
    padding: 18px 14px;
    z-index: 5;
  }
  .fs-drawer.open{ transform: translateX(0); }
  .fs-drawer h4{
    font-family: var(--display);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .fs-channel-list{
    display:flex;
    flex-direction:column;
    gap: 6px;
  }

  .stage-controls{
    display:flex; align-items:center; justify-content:space-between;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .stage-controls .status{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: .5px;
  }
  .stage-controls .status b{ color: var(--text); font-weight:500; }

  .reload-btn{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .5px;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .reload-btn:hover{ border-color: var(--cyan); color: var(--cyan); }

  /* ---------- channel deck ---------- */
  .deck{
    max-width: 1180px;
    margin: 36px auto 0;
    padding: 0 clamp(20px, 5vw, 56px) 64px;
  }

  .deck-head{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }
  .deck-head h2{
    font-family: var(--display);
    font-weight:500;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .deck-head span{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .channel-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 10px;
  }

  .channel-card{
    display:flex;
    align-items:center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor:pointer;
    text-align:left;
    transition: border-color .18s ease, background .18s ease, transform .18s ease;
  }
  .channel-card:hover{
    border-color: rgba(77,216,232,0.4);
    transform: translateY(-1px);
  }
  .channel-card.active{
    background: var(--surface-raised);
    border-color: var(--cyan);
    box-shadow: 0 0 0 1px rgba(77,216,232,0.15), 0 8px 24px -12px rgba(77,216,232,0.25);
  }

  .channel-card .logo{
    width: 40px; height:40px;
    border-radius: 7px;
    background: var(--surface-raised);
    object-fit: cover;
    flex-shrink:0;
    border: 1px solid var(--border);
  }

  .channel-card .info{ min-width:0; }
  .channel-card .num{
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }
  .channel-card.active .num{ color: var(--cyan); }
  .channel-card .name{
    font-family: var(--display);
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
  }

  .empty-state{
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 32px 20px;
    text-align:center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .empty-state code{
    font-family: var(--mono);
    background: var(--surface);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--amber);
  }

  @media (max-width: 540px){
    .lower-third{ left:10px; bottom:10px; padding:8px 12px 8px 8px; }
    .lower-third .num{ font-size:16px; }
    .channel-grid{ grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); }
  }

  :focus-visible{
    outline: 2px solid var(--cyan);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce){
    .brand .dot, .lower-third .tag::before{ animation: none; }
    .channel-card{ transition:none; }
  }
</style>
</head>
<body>

  <header class="topbar">
    <div class="brand"><span class="dot"></span> CHANNEL DECK</div>
    <div class="clock" id="clock">--:--:--</div>
  </header>

  <main class="stage">
    <div class="monitor" id="monitor">
      <video id="video" playsinline muted></video>
      <div class="scanline-overlay"></div>
      <button class="center-toggle" id="centerToggle" type="button" aria-label="প্লে/পজ">
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 21 12 6 21 6 3"></polygon></svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="3" width="5" height="18"></rect><rect x="14" y="3" width="5" height="18"></rect></svg>
      </button>
      <div class="placeholder" id="placeholder">
        <div class="glyph">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </div>
        <p>একটি চ্যানেল বেছে নিন প্লে শুরু করতে</p>
      </div>
      <div class="lower-third" id="lowerThird">
        <div class="num" id="ltNum">--</div>
        <div class="meta">
          <div class="name" id="ltName">—</div>
          <div class="tag">ON AIR</div>
        </div>
      </div>
      <div class="volume-wrap">
        <div class="volume-slider-pill">
          <input type="range" id="volumeSlider" min="0" max="100" value="100" aria-label="ভলিউম">
        </div>
        <button class="mute-btn" id="muteBtn" type="button" aria-label="সাউন্ড অন/অফ">
          <svg id="muteIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path class="vol-wave" d="M15.5 8.5a5 5 0 0 1 0 7"></path>
            <line class="x-line" x1="23" y1="9" x2="17" y2="15"></line>
            <line class="x-line" x1="17" y1="9" x2="23" y2="15"></line>
          </svg>
        </button>
      </div>
      <button class="stop-btn" id="stopBtn" type="button" aria-label="ভিডিও বন্ধ করুন">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="5" y="5" width="14" height="14" rx="1.5"></rect>
        </svg>
      </button>
      <button class="channels-btn" id="channelsBtn" type="button" aria-label="চ্যানেল লিস্ট">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="fs-drawer" id="fsDrawer">
        <h4>চ্যানেল লিস্ট</h4>
        <div class="fs-channel-list" id="fsChannelList"></div>
      </div>
      <button class="fullscreen-btn" id="fullscreenBtn" type="button" aria-label="ফুলস্ক্রিন">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="15 3 21 3 21 9"></polyline>
          <polyline points="9 21 3 21 3 15"></polyline>
          <line x1="21" y1="3" x2="14" y2="10"></line>
          <line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
      </button>
    </div>

    <div class="stage-controls">
      <div class="status" id="status">স্ট্যাটাস: <b>স্ট্যান্ডবাই</b></div>
      <button class="reload-btn" id="reloadBtn">⟳ চ্যানেল লিস্ট রিলোড করুন</button>
    </div>
  </main>

  <section class="deck">
    <div class="deck-head">
      <h2>চ্যানেল লিস্ট</h2>
      <span id="countLabel">0 চ্যানেল</span>
    </div>
    <div class="channel-grid" id="channelGrid"></div>
  </section>

<script>
  const video = document.getElementById('video');
  const monitor = document.getElementById('monitor');
  const placeholder = document.getElementById('placeholder');
  const centerToggle = document.getElementById('centerToggle');
  const lowerThird = document.getElementById('lowerThird');
  const ltNum = document.getElementById('ltNum');
  const ltName = document.getElementById('ltName');
  const grid = document.getElementById('channelGrid');
  const fsChannelList = document.getElementById('fsChannelList');
  const countLabel = document.getElementById('countLabel');
  const statusEl = document.getElementById('status');
  const reloadBtn = document.getElementById('reloadBtn');
  const clockEl = document.getElementById('clock');
  const muteBtn = document.getElementById('muteBtn');

  let hls = null;
  let activeId = null;
  let userWantsSound = false;

  function syncMuteIcon(){
    muteBtn.classList.toggle('is-muted', video.muted);
  }

  muteBtn.addEventListener('click', () => {
    video.muted = !video.muted;
    userWantsSound = !video.muted;
    if(!video.muted){
      video.play().catch(()=>{});
      if(video.volume === 0){ video.volume = 1; }
    }
    syncMuteIcon();
    volumeSlider.value = Math.round(video.muted ? 0 : video.volume * 100);
  });
  syncMuteIcon();

  const volumeSlider = document.getElementById('volumeSlider');
  volumeSlider.addEventListener('input', () => {
    const v = Number(volumeSlider.value) / 100;
    video.volume = v;
    video.muted = (v === 0);
    userWantsSound = v > 0;
    if(v > 0){ video.play().catch(()=>{}); }
    syncMuteIcon();
  });

  const fullscreenBtn = document.getElementById('fullscreenBtn');
  fullscreenBtn.addEventListener('click', () => {
    if(document.fullscreenElement){
      document.exitFullscreen();
    } else if(document.documentElement.requestFullscreen){
      document.documentElement.requestFullscreen().then(() => {
        if(screen.orientation && screen.orientation.lock){
          screen.orientation.lock('landscape').catch(() => {
            // not supported (e.g. iOS Safari) — CSS rotate fallback handles it
          });
        }
      }).catch(() => {});
    } else if(video.webkitEnterFullscreen){
      // iOS Safari fallback: only the <video> element supports native fullscreen
      video.webkitEnterFullscreen();
    }
  });

  const channelsBtn = document.getElementById('channelsBtn');
  const fsDrawer = document.getElementById('fsDrawer');
  channelsBtn.addEventListener('click', () => {
    fsDrawer.classList.toggle('open');
    channelsBtn.classList.toggle('active');
  });

  document.addEventListener('fullscreenchange', () => {
    document.body.classList.toggle('is-fullscreen', !!document.fullscreenElement);
    if(!document.fullscreenElement){
      fsDrawer.classList.remove('open');
      channelsBtn.classList.remove('active');
      if(screen.orientation && screen.orientation.unlock){
        screen.orientation.unlock();
      }
    }
  });

  function tickClock(){
    const d = new Date();
    clockEl.textContent = d.toLocaleTimeString('en-GB', { hour12:false });
  }
  tickClock();
  setInterval(tickClock, 1000);

  function setStatus(text){
    statusEl.innerHTML = 'স্ট্যাটাস: <b>' + text + '</b>';
  }

  function syncCenterToggle(){
    const hasChannel = !!activeId;
    centerToggle.classList.toggle('show', hasChannel && video.paused);
    centerToggle.classList.toggle('is-playing', !video.paused);
  }
  video.addEventListener('play', syncCenterToggle);
  video.addEventListener('pause', syncCenterToggle);
  video.addEventListener('playing', syncCenterToggle);
  function jumpToLiveEdge(){
    try{
      if(hls && typeof hls.liveSyncPosition === 'number' && isFinite(hls.liveSyncPosition)){
        video.currentTime = hls.liveSyncPosition;
      } else if(video.seekable && video.seekable.length){
        video.currentTime = video.seekable.end(video.seekable.length - 1);
      }
    }catch(e){ /* ignore — not a live stream or not seekable yet */ }
  }

  centerToggle.addEventListener('click', () => {
    if(video.paused){
      jumpToLiveEdge();
      video.play().catch(()=>{});
    } else{
      video.pause();
    }
  });

  const stopBtn = document.getElementById('stopBtn');
  function stopChannel(){
    if(hls){ hls.destroy(); hls = null; }
    video.pause();
    video.removeAttribute('src');
    video.load();
    placeholder.style.display = 'flex';
    lowerThird.classList.remove('show');
    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
    activeId = null;
    syncCenterToggle();
    setStatus('বন্ধ');
  }
  stopBtn.addEventListener('click', stopChannel);

  function playChannel(ch, cardEl){
    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('[data-ch-id="' + ch.id + '"]').forEach(c => c.classList.add('active'));
    activeId = ch.id;
    fsDrawer.classList.remove('open');
    channelsBtn.classList.remove('active');

    placeholder.style.display = 'none';
    ltNum.textContent = ch.number || '--';
    ltName.textContent = ch.name || 'Unknown';
    lowerThird.classList.add('show');
    setStatus('লোড হচ্ছে…');
    syncCenterToggle();

    if(hls){ hls.destroy(); hls = null; }

    if(window.Hls && Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(ch.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(()=>{});
        setStatus('লাইভ — ' + ch.name);
      });
      hls.on(Hls.Events.ERROR, (event, data) => {
        if(data.fatal){
          setStatus('এরর — স্ট্রিম লোড করা যায়নি');
        }
      });
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = ch.url;
      video.addEventListener('loadedmetadata', () => {
        video.play().catch(()=>{});
        setStatus('লাইভ — ' + ch.name);
      }, { once:true });
    } else {
      setStatus('এই ব্রাউজারে HLS সাপোর্ট নেই');
    }
  }

  function renderChannels(list){
    grid.innerHTML = '';
    fsChannelList.innerHTML = '';
    countLabel.textContent = list.length + (list.length === 1 ? ' চ্যানেল' : ' চ্যানেল');

    if(!list.length){
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.style.gridColumn = '1/-1';
      empty.innerHTML = 'এখনও কোনো চ্যানেল যোগ করা হয়নি। <br><code>channels.json</code> ফাইলে চ্যানেল যোগ করুন।';
      grid.appendChild(empty);
      return;
    }

    list.forEach((ch, i) => {
      const cardHtml = `
        <img class="logo" src="${ch.logo || 'https://placehold.co/80x80/1a1f2b/8a93a6?text=' + (ch.number||'')}" alt="" onerror="this.style.visibility='hidden'">
        <div class="info">
          <div class="num">CH ${ch.number || (i+1).toString().padStart(2,'0')}</div>
          <div class="name">${ch.name}</div>
        </div>
      `;

      const card = document.createElement('button');
      card.className = 'channel-card';
      card.type = 'button';
      card.dataset.chId = ch.id;
      card.innerHTML = cardHtml;
      card.addEventListener('click', () => playChannel(ch));
      grid.appendChild(card);

      const fsCard = document.createElement('button');
      fsCard.className = 'channel-card';
      fsCard.type = 'button';
      fsCard.dataset.chId = ch.id;
      fsCard.innerHTML = cardHtml;
      fsCard.addEventListener('click', () => playChannel(ch));
      fsChannelList.appendChild(fsCard);
    });
  }

  async function loadChannels(){
    setStatus('চ্যানেল লিস্ট লোড হচ্ছে…');
    try{
      const res = await fetch('channels.json?_=' + Date.now());
      const data = await res.json();
      renderChannels(data);
      setStatus('স্ট্যান্ডবাই');
    }catch(err){
      console.error(err);
      renderChannels([]);
      setStatus('channels.json লোড করতে সমস্যা হয়েছে');
    }
  }

  reloadBtn.addEventListener('click', loadChannels);
  loadChannels();
</script>

</body>
</html>
